<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MRTP-V18(V16樣式+背景+中央圖)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                    },
                    fontFamily: {
                        sans: ['Inter','system-ui','sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .grid-item {
                @apply transition-all duration-150 bg-white/80 border border-gray-200/50;
            }
            .control-button {
                @apply fixed top-2 right-2 bg-white/90 backdrop-blur-sm p-2 rounded-full shadow-lg z-50 w-10 h-10 flex items-center justify-center;
            }
            .control-button.active {
                @apply bg-primary text-white;
            }
            .settings-panel {
                @apply fixed top-14 right-2 bg-white/95 backdrop-blur-md p-3 rounded-lg shadow-lg z-40 translate-x-full transition-transform duration-300 w-64;
            }
            .settings-panel.active {
                @apply translate-x-0;
            }
            .active-count {
                @apply fixed top-2 left-2 bg-secondary/90 text-white px-2 py-1 rounded-lg text-xs font-medium z-50;
            }
            .color-option {
                @apply w-7 h-7 rounded-full cursor-pointer border-2 border-transparent;
            }
            .color-option.selected {
                @apply border-black scale-110;
            }
            /* 中央圖片樣式 */
            .center-image {
                @apply absolute inset-0 bg-center bg-no-repeat pointer-events-none z-0;
            }
        }
    </style>
</head>
<body class="h-screen m-0 font-sans overflow-hidden bg-gray-100 flex flex-col">
    <div id="app" class="flex-1 flex flex-col relative">
        
        <!-- 中央背景圖 -->
        <div id="center-image" class="center-image" style="background-image: url('https://www.miracletouch.com.tw/www/upload/file/250407155815725bb.jpg'); background-size: 70% auto;"></div>

        <!-- 計數 -->
        <div id="active-count" class="active-count">
            <span id="count">0</span>
        </div>

        <!-- 設置按鈕 -->
        <button id="settingsBtn" class="control-button">
            <i class="fa fa-cog"></i>
        </button>

        <!-- 設置面板 -->
        <div id="panel" class="settings-panel">
            <div class="flex flex-col gap-2">
                <div class="flex items-center justify-between">
                    <label class="text-xs font-medium">縱向:</label>
                    <input type="number" id="rows" value="4" min="1" max="50" class="w-16 px-2 py-1 border rounded text-xs">
                </div>
                <div class="flex items-center justify-between">
                    <label class="text-xs font-medium">橫向:</label>
                    <input type="number" id="cols" value="6" min="1" max="50" class="w-16 px-2 py-1 border rounded text-xs">
                </div>

                <div class="pt-2">
                    <label class="text-xs font-medium">顏色</label>
                    <div class="flex flex-wrap gap-1.5 mt-1">
                        <div class="color-option selected" data-color="#FF3B30" style="background:#FF3B30"></div>
                        <div class="color-option" data-color="#FF9500" style="background:#FF9500"></div>
                        <div class="color-option" data-color="#FFCC00" style="background:#FFCC00"></div>
                        <div class="color-option" data-color="#34C759" style="background:#34C759"></div>
                        <div class="color-option" data-color="#00BCD4" style="background:#00BCD4"></div>
                        <div class="color-option" data-color="#007AFF" style="background:#007AFF"></div>
                        <div class="color-option" data-color="#AF52DE" style="background:#AF52DE"></div>
                        <div class="color-option" data-color="#8E8E93" style="background:#8E8E93"></div>
                        <div class="color-option" data-color="#000000" style="background:#000000"></div>
                    </div>
                </div>

                <div class="flex gap-2 pt-2">
                    <button id="create" class="flex-1 bg-primary text-white rounded px-2 py-1 text-xs">生成</button>
                    <button id="reset" class="flex-1 bg-gray-400 text-white rounded px-2 py-1 text-xs">重置</button>
                    <button id="full" class="flex-1 bg-secondary text-white rounded px-2 py-1 text-xs">全屏</button>
                </div>
            </div>
        </div>

        <!-- 網格滿版 -->
        <div class="absolute inset-0 p-2 z-10">
            <div id="grid" class="grid w-full h-full"></div>
        </div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const count = document.getElementById('count');
        const panel = document.getElementById('panel');
        const settingsBtn = document.getElementById('settingsBtn');
        const rowsInp = document.getElementById('rows');
        const colsInp = document.getElementById('cols');
        const createBtn = document.getElementById('create');
        const resetBtn = document.getElementById('reset');
        const fullBtn = document.getElementById('full');
        const colorOpts = document.querySelectorAll('.color-option');

        let currentColor = '#007AFF';
        let activeTouches = new Map();

        // 完全保留 V18 滑鼠 / 觸控
        function buildGrid(r, c) {
            grid.innerHTML = '';
            grid.style.gridTemplateRows = `repeat(${r}, 1fr)`;
            grid.style.gridTemplateColumns = `repeat(${c}, 1fr)`;

            for(let i=0; i<r*c; i++) {
                const d = document.createElement('div');
                d.className = 'grid-item';

                // 滑鼠
                d.addEventListener('mousedown', e => {
                    e.preventDefault();
                    toggle(d);
                });
                d.addEventListener('mouseenter', e => {
                    if(e.buttons === 1) toggle(d);
                });

                // 觸控
                d.addEventListener('touchstart', e => {
                    e.preventDefault();
                    const t = e.touches[0];
                    const tar = document.elementFromPoint(t.clientX, t.clientY);
                    if(tar?.classList.contains('grid-item')) {
                        toggle(tar);
                        activeTouches.set(t.identifier, tar);
                    }
                });
                d.addEventListener('touchmove', e => {
                    e.preventDefault();
                    for(let t of e.touches) {
                        const tar = document.elementFromPoint(t.clientX, t.clientY);
                        if(tar?.classList.contains('grid-item')) {
                            if(!activeTouches.has(t.identifier) || activeTouches.get(t.identifier)!==tar) {
                                toggle(tar);
                                activeTouches.set(t.identifier, tar);
                            }
                        }
                    }
                });
                d.addEventListener('touchend', () => activeTouches.clear());

                grid.appendChild(d);
            }
            updateCount();
        }

        function toggle(el) {
            el.style.backgroundColor = el.style.backgroundColor ? '' : currentColor;
            updateCount();
        }

        function updateCount() {
            count.textContent = document.querySelectorAll('.grid-item[style*="background-color"]').length;
        }

        colorOpts.forEach(o => {
            o.addEventListener('click', () => {
                colorOpts.forEach(x => x.classList.remove('selected'));
                o.classList.add('selected');
                currentColor = o.dataset.color;
            });
        });

        settingsBtn.addEventListener('click', () => {
            panel.classList.toggle('active');
            settingsBtn.classList.toggle('active');
        });

        createBtn.onclick = () => buildGrid(+rowsInp.value, +colsInp.value);
        resetBtn.onclick = () => {
            document.querySelectorAll('.grid-item').forEach(i => i.style.backgroundColor = '');
            updateCount();
        };
        fullBtn.onclick = () => {
            document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
        };

        buildGrid(3,3);
    </script>
</body>
</html>
